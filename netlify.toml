[build]
  command = "echo 'Packaging Serverless Layers...'"
  publish = "public"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["express", "ejs", "mongoose", "multer", "jsonwebtoken", "cookie-parser"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true
